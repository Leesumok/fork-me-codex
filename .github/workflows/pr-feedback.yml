name: Codex PR feedback

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-feedback-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  feedback:
    if: >-
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.sender.type != 'Bot' &&
        contains(github.event.comment.body, '@codex')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        github.event.sender.type != 'Bot' &&
        contains(github.event.comment.body, '@codex')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.sender.type != 'Bot' &&
        github.event.review.body != null &&
        contains(github.event.review.body, '@codex')
      )
    runs-on: [self-hosted, codex]

    steps:
      - name: Resolve PR feedback request
        id: request
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const commandPattern = /@codex\b/i;
            let requested = false;
            let prNumber = null;

            if (context.eventName === 'issue_comment') {
              requested =
                Boolean(context.payload.issue.pull_request) &&
                commandPattern.test(context.payload.comment.body ?? '');
              prNumber = requested ? context.payload.issue.number : null;
            }

            if (context.eventName === 'pull_request_review_comment') {
              requested = commandPattern.test(context.payload.comment.body ?? '');
              prNumber = requested ? context.payload.pull_request.number : null;
            }

            if (context.eventName === 'pull_request_review') {
              requested = commandPattern.test(context.payload.review.body ?? '');
              prNumber = requested ? context.payload.pull_request.number : null;
            }

            core.setOutput('requested', requested ? 'true' : 'false');
            if (!requested) return;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const canPush = pr.head.repo.full_name === context.payload.repository.full_name;
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('can_push', canPush ? 'true' : 'false');

      - name: Check trusted actor
        id: auth
        if: steps.request.outputs.requested == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const actor = context.payload.sender.login;

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              const trusted = ['admin', 'maintain', 'write'].includes(data.permission);
              core.setOutput('authorized', trusted ? 'true' : 'false');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.setOutput('authorized', 'false');
            }

      - name: Report unsupported fork PR
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.request.outputs.pr_number }}'),
              body: 'Codex PR feedback was not applied because this PR branch is from an external fork. For safety, OAuth-backed Codex workflows only run on branches in the base repository.',
            });

      - name: Check Codex CLI OAuth session
        id: preflight
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true'
        continue-on-error: true
        run: |
          codex --version
          codex login status >/dev/null

      - name: Report missing Codex CLI OAuth session
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true' && steps.preflight.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.request.outputs.pr_number }}'),
              body: 'Codex PR feedback could not run because the self-hosted runner is missing Codex CLI or is not logged in. Log in on the runner with `codex login --device-auth` as the runner service user.',
            });

      - name: Checkout PR branch
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true' && steps.preflight.outcome == 'success'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.request.outputs.head_ref }}
          fetch-depth: 0

      - name: Configure Git
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true' && steps.preflight.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build Codex prompt
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true' && steps.preflight.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            let instruction = '';
            if (context.eventName === 'issue_comment') {
              instruction = context.payload.comment.body ?? '';
            } else if (context.eventName === 'pull_request_review_comment') {
              instruction = context.payload.comment.body ?? '';
            } else if (context.eventName === 'pull_request_review') {
              instruction = context.payload.review.body ?? '';
            }

            const contextData = {
              repository: context.payload.repository.full_name,
              event_name: context.eventName,
              instruction,
              latest_user_prompt: instruction,
              pull_request: {
                number: pr.number,
                title: pr.title,
                body: pr.body ?? '',
                state: pr.state,
                base_ref: pr.base.ref,
                head_ref: pr.head.ref,
                head_sha: pr.head.sha,
                author: pr.user.login,
              },
              changed_files: files.slice(0, 100).map((file) => ({
                filename: file.filename,
                status: file.status,
                additions: file.additions,
                deletions: file.deletions,
                changes: file.changes,
              })),
              recent_issue_comments: issueComments.slice(-20).map((comment) => ({
                author: comment.user.login,
                author_association: comment.author_association,
                body: comment.body ?? '',
                created_at: comment.created_at,
              })),
              recent_review_comments: reviewComments.slice(-30).map((comment) => ({
                author: comment.user.login,
                path: comment.path,
                line: comment.line ?? comment.original_line,
                body: comment.body ?? '',
                created_at: comment.created_at,
              })),
              recent_reviews: reviews.slice(-20).map((review) => ({
                author: review.user.login,
                state: review.state,
                body: review.body ?? '',
                submitted_at: review.submitted_at,
              })),
            };

            const template = fs.readFileSync('.github/codex/prompts/pr-feedback.md', 'utf8');
            fs.writeFileSync(
              'codex-prompt.md',
              `${template}\n\n## Event Context\n\n\`\`\`json\n${JSON.stringify(contextData, null, 2)}\n\`\`\`\n`,
            );
        env:
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}

      - name: Run Codex
        id: run_codex
        if: steps.request.outputs.requested == 'true' && steps.auth.outputs.authorized == 'true' && steps.request.outputs.can_push == 'true' && steps.preflight.outcome == 'success'
        run: |
          codex exec \
            --cd "$GITHUB_WORKSPACE" \
            --ephemeral \
            --dangerously-bypass-approvals-and-sandbox \
            --output-last-message codex-output.md \
            - < codex-prompt.md

      - name: Detect file changes
        id: changes
        if: steps.run_codex.outcome == 'success'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Codex changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "Apply Codex PR feedback"

      - name: Push PR branch
        if: steps.changes.outputs.changed == 'true'
        env:
          HEAD_REF: ${{ steps.request.outputs.head_ref }}
        run: |
          git push origin "HEAD:$HEAD_REF"

      - name: Comment on PR feedback result
        if: steps.changes.outputs.changed == 'true' || steps.changes.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const changed = '${{ steps.changes.outputs.changed }}' === 'true';
            const finalMessage = fs.existsSync('codex-output.md')
              ? fs.readFileSync('codex-output.md', 'utf8').trim()
              : 'Codex completed.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.request.outputs.pr_number }}'),
              body: [
                changed
                  ? 'Codex applied the requested PR feedback and pushed a new commit.'
                  : 'Codex reviewed the requested PR feedback but made no file changes.',
                '',
                finalMessage,
              ].join('\n'),
            });

      - name: Report Codex failure
        if: failure() && steps.run_codex.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.request.outputs.pr_number }}'),
              body: 'Codex PR feedback failed before it produced usable changes. Check the workflow logs for details.',
            });
