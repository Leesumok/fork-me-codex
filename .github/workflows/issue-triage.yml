name: Codex issue triage

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    if: >-
      github.event.issue.pull_request == null &&
      (
        (
          github.event_name == 'issues' &&
          (
            github.event.action == 'opened' ||
            (github.event.action == 'labeled' && github.event.label.name == 'codex:triage')
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '@codex triage')
        )
      )
    runs-on: [self-hosted, codex]

    steps:
      - name: Check trusted actor
        id: auth
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const actor = context.payload.sender.login;

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              const trusted = ['admin', 'maintain', 'write'].includes(data.permission);
              core.setOutput('authorized', trusted ? 'true' : 'false');
              core.setOutput('actor', actor);
            } catch (error) {
              if (error.status !== 404) throw error;
              core.setOutput('authorized', 'false');
              core.setOutput('actor', actor);
            }

      - name: Check Codex CLI OAuth session
        id: preflight
        if: steps.auth.outputs.authorized == 'true'
        continue-on-error: true
        run: |
          codex --version
          codex login status >/dev/null

      - name: Report missing Codex CLI OAuth session
        if: steps.auth.outputs.authorized == 'true' && steps.preflight.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Codex issue triage could not run because the self-hosted runner is missing Codex CLI or is not logged in. Log in on the runner with `codex login --device-auth` as the runner service user.',
            });

      - name: Checkout repository
        if: steps.auth.outputs.authorized == 'true' && steps.preflight.outcome == 'success'
        uses: actions/checkout@v5

      - name: Build Codex prompt
        if: steps.auth.outputs.authorized == 'true' && steps.preflight.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const contextData = {
              repository: context.payload.repository.full_name,
              event: {
                action: context.payload.action,
                triggering_label: context.payload.label?.name ?? null,
                triggering_comment: context.payload.comment?.body ?? '',
                sender: context.payload.sender.login,
              },
              issue: {
                number: issue.number,
                title: issue.title,
                body: issue.body ?? '',
                author: issue.user.login,
                author_association: issue.author_association,
                labels: issue.labels.map((label) => label.name),
              },
              recent_comments: comments.slice(-20).map((comment) => ({
                author: comment.user.login,
                author_association: comment.author_association,
                body: comment.body ?? '',
                created_at: comment.created_at,
              })),
            };

            const template = fs.readFileSync('.github/codex/prompts/issue-triage.md', 'utf8');
            fs.writeFileSync(
              'codex-prompt.md',
              `${template}\n\n## Event Context\n\n\`\`\`json\n${JSON.stringify(contextData, null, 2)}\n\`\`\`\n`,
            );

      - name: Run Codex
        id: run_codex
        if: steps.auth.outputs.authorized == 'true' && steps.preflight.outcome == 'success'
        run: |
          codex exec \
            --cd "$GITHUB_WORKSPACE" \
            --ephemeral \
            --sandbox read-only \
            --output-schema .github/codex/schemas/issue-update.schema.json \
            --output-last-message codex-output.json \
            - < codex-prompt.md

      - name: Apply issue update
        if: steps.run_codex.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            try {
              const raw = fs.readFileSync('codex-output.json', 'utf8').trim();
              const result = JSON.parse(raw);

              if (!result.title?.trim() || !result.body?.trim() || !result.summary_comment?.trim()) {
                throw new Error('Codex output was missing title, body, or summary_comment.');
              }

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                title: result.title.trim(),
                body: result.body.trim(),
              });

              const status = result.needs_clarification
                ? 'Codex rewrote this issue, but it still needs clarification.'
                : 'Codex rewrote this issue into an actionable spec.';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `### Codex issue triage\n\n${status}\n\n${result.summary_comment.trim()}`,
              });
            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Codex issue triage failed while applying the generated update: ${error.message}`,
              });
              throw error;
            }

      - name: Report Codex failure
        if: failure() && steps.run_codex.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Codex issue triage failed before it produced a usable issue update. Check the workflow logs for details.',
            });
