name: Setup Codex labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const activeLabel = {
              name: 'code-gen',
              color: '238636',
              description: 'Ask Codex to implement the issue and open a PR.',
            };
            const legacyLabels = [
              'codegen',
              'codex:triage',
              'codex:revise',
              'codex:codegen',
              'codex:fix-pr',
              'codex:review',
            ];

            try {
              await github.rest.issues.updateLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: activeLabel.name,
                color: activeLabel.color,
                description: activeLabel.description,
              });
            } catch (error) {
              if (error.status !== 404) throw error;

              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ...activeLabel,
              });
            }

            for (const name of legacyLabels) {
              try {
                await github.rest.issues.deleteLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
