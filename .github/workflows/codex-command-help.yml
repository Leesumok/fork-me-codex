name: Codex command help

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  help:
    if: >-
      github.event.sender.type != 'Bot' &&
      contains(github.event.comment.body, '@codex') &&
      contains(github.event.comment.body, '@codex triage') == false &&
      contains(github.event.comment.body, '@codex revise') == false &&
      contains(github.event.comment.body, '@codex implement') == false &&
      contains(github.event.comment.body, '@codex review') == false &&
      contains(github.event.comment.body, '@codex fix') == false &&
      contains(github.event.comment.body, '@codex apply') == false
    runs-on: ubuntu-latest

    steps:
      - name: Check trusted actor
        id: auth
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const actor = context.payload.sender.login;

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              const trusted = ['admin', 'maintain', 'write'].includes(data.permission);
              core.setOutput('authorized', trusted ? 'true' : 'false');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.setOutput('authorized', 'false');
            }

      - name: Post command help
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const isPr = Boolean(context.payload.issue.pull_request);
            const commands = isPr
              ? [
                  '`@codex review` - review this pull request.',
                  '`@codex fix` - apply requested PR feedback.',
                  '`@codex apply` - apply requested PR review suggestions.',
                ]
              : [
                  '`@codex triage` - rewrite this issue into an actionable spec.',
                  '`@codex revise` - revise this issue from the latest comments.',
                  '`@codex implement` - implement this issue and open a PR.',
                ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                'Codex needs an explicit command.',
                '',
                ...commands,
              ].join('\n'),
            });
